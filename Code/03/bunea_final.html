<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
<title>Bunea_Foggy_Bottom</title>
</head>

<body>

<!--Tells us our train is coming-->

<div>I think my train is coming! <button id= "button">I see it!</button></div>


<canvas id="gl-canvas" width="800" height="600"> </canvas>
<script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

in vec4 aPosition;
in vec4 aColor;
out vec4 vColor;

void
main()
{
    gl_Position = aPosition;
    gl_PointSize = 10.0; 
    vColor = aColor;
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es
precision mediump float;

in vec4 vColor;
out vec4 fColor;

void
main()
{
    fColor = vColor;
}
</script>

<script src="../Common/initShaders.js"></script>
<script src="../Common/MVnew.js"></script>
<script src="bunea_final.js"></script>

</body>
</html>
